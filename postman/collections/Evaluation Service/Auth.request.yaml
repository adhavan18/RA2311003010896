$kind: http-request
name: Auth
method: POST
url: '{{baseUrl}}/auth'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{email}}",
      "name": "{{name}}",
      "rollNo": "{{rollNo}}",
      "accessCode": "{{accessCode}}",
      "clientID": "{{clientID}}",
      "clientSecret": "{{clientSecret}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      var res = pm.response.json();
      pm.environment.set("accessToken", res.access_token);
